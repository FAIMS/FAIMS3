# Optional properties-format config for gesellix/couchdb-prometheus-exporter.
# The load-test stack configures the exporter via docker-compose env_file plus
# `--databases=${COUCHDB_EXPORTER_DATABASES:-_all_dbs}` for per-DB stats.
#
# See: https://github.com/gesellix/couchdb-prometheus-exporter

couchdb.uri=http://host.docker.internal:5984
couchdb.username=admin
couchdb.password=change-me
