global:
  scrape_interval: 5s

scrape_configs:
  - job_name: pushgateway
    honor_labels: true
    static_configs:
      - targets: ['pushgateway:9091']

  # Coordinator runs on the host during local dev — not on the compose network.
  - job_name: coordinator
    static_configs:
      - targets: ['host.docker.internal:4000']
    metrics_path: /metrics

  - job_name: couchdb
    static_configs:
      - targets: ['couchdb-exporter:9984']
